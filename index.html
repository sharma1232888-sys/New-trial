<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Special One ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL DESIGN
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
background-size:400% 400%;
animation:gradient 10s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* =========================
   NAVBAR
========================= */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
z-index:1000;
}

nav h2{
font-size:20px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:500;
}

/* =========================
   HERO SECTION
========================= */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.12);
padding:40px;
border-radius:25px;
backdrop-filter:blur(15px);
max-width:650px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.card h1{
font-size:42px;
margin-bottom:10px;
}

.card p{
font-size:18px;
opacity:0.9;
line-height:1.6;
}

.btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* =========================
   SECTIONS
========================= */

.section{
padding:80px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.box{
background:rgba(255,255,255,0.12);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
transition:0.3s;
cursor:pointer;
}

.box:hover{
transform:translateY(-8px);
}

/* =========================
   MODAL
========================= */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
color:black;
padding:25px;
border-radius:15px;
text-align:center;
max-width:300px;
}

/* =========================
   HEARTS
========================= */

.heart{
position:fixed;
bottom:-20px;
color:pink;
font-size:18px;
animation:float 6s linear infinite;
}

@keyframes float{
to{
transform:translateY(-110vh);
opacity:0;
}
}

</style>
</head>
<body>

<!-- NAV -->
<nav>
<h2>❤️ Love</h2>
<div>
<a href="#home">Home</a>
<a href="#timeline">Timeline</a>
<a href="#letters">Letters</a>
</div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<div class="card">
<h1>Hey ❤️</h1>
<p>This is not just a website… it's my feelings for you.</p>

<button class="btn" onclick="start()">Open Surprise</button>
<button class="btn" onclick="toggleMusic()">🎵 Music</button>
</div>
</section>

<!-- TIMELINE -->
<section class="section" id="timeline">
<h2>🕰️ Our Journey</h2>

<div class="grid">
<div class="box">💌 First Message</div>
<div class="box">❤️ First Meet</div>
<div class="box">💞 Relationship Start</div>
<div class="box">📞 First Call</div>
</div>
</section>

<!-- OPEN WHEN -->
<section class="section" id="letters">
<h2>💌 Open When</h2>

<div class="grid">
<div class="box" onclick="openModal('Stay strong ❤️')">Sad</div>
<div class="box" onclick="openModal('Everything will be fine ❤️')">Stressed</div>
<div class="box" onclick="openModal('I miss you too ❤️')">Missing Me</div>
<div class="box" onclick="openModal('You are amazing ❤️')">Demotivated</div>
</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<p id="msg"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);

/* modal */
function openModal(text){
document.getElementById("modal").style.display="flex";
document.getElementById("msg").innerText=text;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* music */
let playing=false;
function toggleMusic(){
let m=document.getElementById("music");
if(!playing){m.play();playing=true;}
else{m.pause();playing=false;}
}

/* start */
function start(){
alert("Welcome to your world ❤️");
}

</script>

</body>
</html>
